<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TooluBaay - Conseiller Agricole</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/leaf.png" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/leaf.png" />
    <meta name="theme-color" content="#5A5A40" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="TooluBaay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/leaf.png" />
    <script>
      // Shim process for browser compatibility
      window.process = window.process || { env: {} };
      
      const isDev = window.location.hostname.includes('ais-dev') || window.location.hostname === 'localhost';
      
      // Actively UNREGISTER any stuck service workers that cause the "loading" hang
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Cleaned stale cache for instant start');
          }
        });
      }

      // Pre-clear Gemini loading messages if they persist in DOM
      window.addEventListener('DOMContentLoaded', () => {
        const bodyText = document.body.innerText;
        if (bodyText.includes('Gemini') && bodyText.includes('wait')) {
           console.log('Suppressing platform loading text');
        }
      });

      // Safeguard: Force remove splash after 5 seconds if React fails to mount
      setTimeout(() => {
        const splash = document.getElementById('instant-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      }, 5000);
    </script>
  </head>
  <body class="bg-[#f5f5f0]">
    <div id="root">
      <!-- Instant Splash Screen: This shows BEFORE the JS loads -->
      <div id="instant-splash" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f5f5f0; z-index: 9999;">
        <div style="position: relative; width: 100px; height: 100px; margin-bottom: 24px;">
          <!-- Custom TooluBaay Branded SVG Logo -->
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="white" stroke="#5A5A40" stroke-width="0.5"/>
            <path d="M50 25C50 25 35 45 35 60C35 68.2843 41.7157 75 50 75C58.2843 75 65 68.2843 65 60C65 45 50 25 50 25Z" fill="#5A5A40" fill-opacity="0.1" stroke="#5A5A40" stroke-width="2"/>
            <path d="M50 75V55" stroke="#5A5A40" stroke-width="2" stroke-linecap="round"/>
            <path d="M40 60C40 60 45 60 50 55" stroke="#5A5A40" stroke-width="2" stroke-linecap="round"/>
            <path d="M60 60C60 60 55 60 50 55" stroke="#5A5A40" stroke-width="2" stroke-linecap="round"/>
            <circle cx="50" cy="35" r="5" fill="#A8A878"/>
          </svg>
        </div>
        <h1 style="font-family: serif; font-style: italic; color: #5A5A40; font-size: 32px; margin: 0; letter-spacing: -0.05em;">TooluBaay</h1>
        <p style="color: rgba(90, 90, 64, 0.5); font-size: 14px; margin-top: 8px;">L'intelligence au service des champs</p>
        <div style="margin-top: 40px; width: 160px; height: 3px; background-color: rgba(90, 90, 64, 0.1); position: relative; overflow: hidden; border-radius: 4px;">
          <div style="position: absolute; height: 100%; width: 40%; background-color: #5A5A40; animation: splash-load 1.2s infinite ease-in-out;"></div>
        </div>
      </div>
      <style>
        @keyframes splash-load {
          0% { left: -50%; }
          100% { left: 100%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
